name: Flutter Integration Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  # =========================================================
  # Android
  # =========================================================
  android-tests:
    name: Android Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules

          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter analyzer
        run: flutter analyze

      - name: Clean previous reports
        run: |
          rm -rf test_reports
          rm -f test_results.json
          mkdir -p test_reports

      - name: Run Android integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_2
          cores: 2
          ram-size: 2048M
          heap-size: 512M
          disable-animations: true
          emulator-options: >-
            -no-window
            -no-audio
            -no-boot-anim
            -no-snapshot
            -gpu swiftshader_indirect
            -no-metrics
          script: bash -lc 'set -o pipefail; flutter devices; timeout 20m flutter test integration_test/task_test.dart -d emulator-5554 --machine | tee test_results.json'

      - name: Generate Android HTML report
        if: always()
        run: |
          rm -rf test_reports
          mkdir -p test_reports

          if [ -s test_results.json ] && [ -f generate_report.py ]; then
            python3 generate_report.py
          else
            echo "The test result file or generate_report.py was not found."
          fi

      - name: Upload Android HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-html-report
          path: test_reports/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Android JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: test_results.json
          if-no-files-found: warn
          retention-days: 14

  # =========================================================
  # iOS
  # =========================================================
  ios-tests:
    name: iOS Integration Tests
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter analyzer
        run: flutter analyze

      - name: Clean previous reports
        run: |
          rm -rf test_reports
          rm -f test_results.json
          mkdir -p test_reports

      - name: Find and start iPhone Simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail

          echo "Available simulators:"
          xcrun simctl list devices available

          DEVICE_ID="$(
            xcrun simctl list devices available |
            grep -E 'iPhone' |
            head -n 1 |
            sed -E 's/.*\(([0-9A-Fa-f-]{36})\).*/\1/'
          )"

          if [ -z "$DEVICE_ID" ]; then
            echo "No available iPhone Simulator was found."
            exit 1
          fi

          echo "Using simulator: $DEVICE_ID"
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

          xcrun simctl boot "$DEVICE_ID" || true
          open -a Simulator
          xcrun simctl bootstatus "$DEVICE_ID" -b

      - name: Verify iOS Simulator
        run: |
          flutter devices
          flutter devices --device-timeout 60

      - name: Run iOS integration tests
        shell: bash
        run: |
          set -o pipefail

          flutter test integration_test/task_test.dart \
            -d "${{ steps.simulator.outputs.device_id }}" \
            --machine |
            tee test_results.json

      - name: Generate iOS HTML report
        if: always()
        run: |
          rm -rf test_reports
          mkdir -p test_reports

          if [ -s test_results.json ] && [ -f generate_report.py ]; then
            python3 generate_report.py
          else
            echo "The test result file or generate_report.py was not found."
          fi

      - name: Upload iOS HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-html-report
          path: test_reports/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload iOS JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: test_results.json
          if-no-files-found: warn
          retention-days: 14

      - name: Collect iOS Simulator logs
        if: failure()
        shell: bash
        run: |
          mkdir -p simulator_logs

          xcrun simctl spawn \
            "${{ steps.simulator.outputs.device_id }}" \
            log show \
            --style compact \
            --last 20m \
            > simulator_logs/ios-simulator.log || true

      - name: Upload iOS Simulator logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-logs
          path: simulator_logs/
          if-no-files-found: ignore
          retention-days: 14

  # =========================================================
  # Final combined result
  # =========================================================
  all-tests-passed:
    name: All Mobile Tests Passed
    needs:
      - android-tests
      - ios-tests

    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check Android and iOS results
        shell: bash
        run: |
          echo "Android result: ${{ needs.android-tests.result }}"
          echo "iOS result: ${{ needs.ios-tests.result }}"

          if [ "${{ needs.android-tests.result }}" != "success" ]; then
            echo "Android integration tests did not pass."
            exit 1
          fi

          if [ "${{ needs.ios-tests.result }}" != "success" ]; then
            echo "iOS integration tests did not pass."
            exit 1
          fi

          echo "Android and iOS integration tests passed successfully."