name: Flutter Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter analyzer
        run: flutter analyze

      - name: Run integration tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          arch: x86_64
          profile: Nexus 6
          cores: 4
          ram-size: 4096M
          heap-size: 512M
          emulator-options: -no-window -no-audio -no-boot-anim -no-snapshot -gpu swiftshader_indirect -no-metrics
          disable-animations: true
          script: flutter test integration_test/task_test.dart --machine > test_results.json
      
      - name: Generate HTML report
        run: python generate_report.py

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: flutter-html-report
          path: test_reports/
      
      - name: Upload test result JSON
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-results
          path: test_results.json

      