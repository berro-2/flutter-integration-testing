name: Flutter Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter analyzer
        run: flutter analyze

      - name: Run integration tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_2
          cores: 2
          ram-size: 2048M
          heap-size: 512M
          disable-animations: true
          emulator-options: -no-window -no-audio -no-boot-anim -no-snapshot -gpu swiftshader_indirect -no-metrics
          script: |
            bash -o pipefail -c '
              set -e

              flutter devices

              timeout 15m flutter test integration_test/task_test.dart \
                -d emulator-5554 \
                --machine | tee test_results.json
            '

      - name: Generate HTML report
        if: always()
        run: |
          if [ -f test_results.json ]; then
            python generate_report.py
          else
            echo "test_results.json was not created because the emulator or tests failed before Flutter generated results."
          fi

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-html-report
          path: test_reports/
          if-no-files-found: ignore

      - name: Upload test result JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-results
          path: test_results.json
          if-no-files-found: ignore