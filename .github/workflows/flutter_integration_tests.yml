name: Flutter iOS Integration Tests

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:
  ios-integration-tests:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show environment information
        run: |
          flutter --version
          flutter doctor -v
          xcodebuild -version
          xcrun simctl list devices available

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install
          cd ..

      - name: Run Flutter analyzer
        run: flutter analyze

      - name: Start iPhone Simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail

          DEVICE_ID="$(
            xcrun simctl list devices available |
            grep -E 'iPhone (16|15|14)' |
            head -n 1 |
            sed -E 's/.*\(([0-9A-F-]+)\) \(Shutdown\).*/\1/'
          )"

          if [ -z "$DEVICE_ID" ]; then
            echo "No suitable iPhone Simulator was found."
            xcrun simctl list devices available
            exit 1
          fi

          echo "Using simulator: $DEVICE_ID"
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

          xcrun simctl boot "$DEVICE_ID" || true
          open -a Simulator

          xcrun simctl bootstatus "$DEVICE_ID" -b

      - name: Verify Flutter device
        run: |
          flutter devices
          flutter devices --device-timeout 60

      - name: Run iOS integration tests
        shell: bash
        run: |
          set -o pipefail

          timeout_seconds=1200

          perl -e 'alarm shift; exec @ARGV' \
            "$timeout_seconds" \
            flutter test integration_test/task_test.dart \
            -d "${{ steps.simulator.outputs.device_id }}" \
            --machine |
            tee test_results.json

      - name: Generate HTML report
        if: always()
        run: |
          if [ -s test_results.json ] && [ -f generate_report.py ]; then
            mkdir -p test_reports
            python3 generate_report.py
          else
            echo "test_results.json or generate_report.py was not found."
          fi

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-ios-html-report
          path: test_reports/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload test result JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-ios-test-results
          path: test_results.json
          if-no-files-found: warn
          retention-days: 14

      - name: Collect Simulator logs
        if: failure()
        run: |
          mkdir -p simulator_logs

          xcrun simctl spawn \
            "${{ steps.simulator.outputs.device_id }}" \
            log show \
            --style compact \
            --last 20m \
            > simulator_logs/ios-simulator.log || true

      - name: Upload Simulator logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-logs
          path: simulator_logs/
          if-no-files-found: ignore