name: Flutter Integration Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules

          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show Flutter information
        run: |
          flutter --version
          flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter analyzer
        run: flutter analyze

      - name: Run integration tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_2
          cores: 2
          ram-size: 2048M
          heap-size: 512M
          disable-animations: true

          emulator-options: >-
            -no-window
            -no-audio
            -no-boot-anim
            -no-snapshot
            -gpu swiftshader_indirect
            -no-metrics

          script: |
            bash -e -o pipefail <<'BASH'
            echo "Available Flutter devices:"
            flutter devices

            echo "Running Flutter integration tests..."

            timeout 20m flutter test integration_test/task_test.dart \
              -d emulator-5554 \
              --machine | tee test_results.json
            BASH

      - name: Generate HTML report
        if: always()
        run: |
          if [ ! -f test_results.json ]; then
            echo "test_results.json was not created."
            exit 0
          fi

          if [ ! -s test_results.json ]; then
            echo "test_results.json is empty."
            exit 0
          fi

          if [ ! -f generate_report.py ]; then
            echo "generate_report.py was not found."
            exit 0
          fi

          mkdir -p test_reports
          python3 generate_report.py

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-html-report
          path: test_reports/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload test result JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-results
          path: test_results.json
          if-no-files-found: warn
          retention-days: 14